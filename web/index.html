<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Foreign Students at Korean Universities</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Foreign Students at Korean Universities</h1>
    <div class="toggle">
      <button class="active" data-view="all">All foreign students</button>
      <button data-view="muslim">Muslim-country students</button>
      <button data-view="region">Muslim students by province</button>
      <button data-view="residents">Muslim residents by province</button>
    </div>
    <button id="detail-btn" class="detail-btn">▦ Detailed view (table)</button>
    <span id="subtitle" class="sub"></span>
  </header>

  <div id="map"></div>
  <div id="legend" class="legend"></div>

  <div id="table-view">
    <div class="table-tabs">
      <button class="active" data-table="muslim">Muslim-country students</button>
      <button data-table="region">Muslim students by province</button>
      <button data-table="residents">Muslim residents by province</button>
    </div>
    <div id="table-meta"></div>
    <div id="table-wrap"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js"></script>
  <script src="app.js"></script>
</body>
</html>
